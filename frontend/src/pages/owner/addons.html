<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add-ons Catalog — SupCrud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Syne", "sans-serif"],
              mono: ["DM Mono", "monospace"],
            },
            colors: {
              bg: "#0c0e14",
              surface: "#13161f",
              card: "#181c28",
              border: "#242840",
              primary: "#5b6ef5",
              accent: "#38e5c4",
              warn: "#f5a623",
              info: "#64b5f6",
              fg: "#e8eaf6",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../../styles/dashboard.css" />
  </head>
  <body class="min-h-screen flex">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <span class="font-display font-bold text-fg text-sm">SupCrud</span>
      </div>
      <nav class="sidebar-nav">
        <a href="../workspace/dashboard.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a1 1 0 001 1h1a1 1 0 011 1v3a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 011-1h1a1 1 0 001-1V7a2 2 0 00-2-2H5z"
            />
          </svg>
          <span>Tickets</span>
        </a>
        <a href="../workspace/agents.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span>Agents</span>
        </a>
        <a href="../workspace/agents.html" class="nav-item active">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 011-1h1a2 2 0 100-4H7a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"
            />
          </svg>
          <span>Add-ons</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../workspace/login.html" class="nav-item nav-item-logout">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="mb-8 fade-up flex justify-between items-end">
        <div>
          <p
            class="text-xs text-muted uppercase tracking-[0.2em] mb-1 font-mono"
          >
            Enhancements
          </p>
          <h1 class="font-display text-3xl font-bold text-fg">
            Add-ons Management
          </h1>
        </div>
        <button
          id="open-create-modal"
          class="px-4 py-2 rounded-lg bg-primary text-white font-mono text-xs font-medium uppercase tracking-wider hover:bg-primary/90 transition-all"
        >
          + Create Add-on
        </button>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="stat-card bg-card border border-primary/20 rounded-xl p-5">
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-widest mb-2"
          >
            Total Modules
          </p>
          <p class="font-display text-3xl font-bold text-fg" id="total-count">
            --
          </p>
        </div>
        <div class="stat-card bg-card border border-accent/20 rounded-xl p-5">
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-widest mb-2"
          >
            Enabled
          </p>
          <p
            class="font-display text-3xl font-bold text-accent"
            id="enabled-count"
          >
            --
          </p>
        </div>
        <div class="stat-card bg-card border border-warn/20 rounded-xl p-5">
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-widest mb-2"
          >
            Disabled
          </p>
          <p
            class="font-display text-3xl font-bold text-warn"
            id="disabled-count"
          >
            --
          </p>
        </div>
      </div>

      <div
        id="addons-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
      >
        <div class="col-span-full py-20 text-center">
          <div
            class="inline-block animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full"
          ></div>
          <p
            class="mt-4 font-mono text-xs text-muted uppercase tracking-widest"
          >
            Loading Catalog...
          </p>
        </div>
      </div>

      <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-box bg-card border border-border shadow-2xl">
          <div class="modal-header border-b border-border p-5">
            <h2
              class="font-display font-semibold text-fg text-base uppercase tracking-wider"
            >
              New System Add-on
            </h2>
          </div>
          <div class="modal-body p-6 space-y-4">
            <div class="field-group">
              <label
                class="block text-[10px] font-mono text-muted uppercase mb-1"
                >Add-on Name</label
              >
              <input
                id="addon-name"
                type="text"
                placeholder="e.g. AI Smart Reply"
                class="w-full bg-bg border border-border rounded-lg p-3 text-sm text-fg outline-none focus:border-primary/50"
              />
            </div>
            <div class="field-group">
              <label
                class="block text-[10px] font-mono text-muted uppercase mb-1"
                >Key (Internal ID)</label
              >
              <input
                id="addon-key"
                type="text"
                placeholder="e.g. ai_smart_reply"
                class="w-full bg-bg border border-border rounded-lg p-3 text-sm text-fg font-mono outline-none focus:border-primary/50"
              />
            </div>
            <div class="field-group">
              <label
                class="block text-[10px] font-mono text-muted uppercase mb-1"
                >Description</label
              >
              <textarea
                id="addon-desc"
                rows="3"
                placeholder="Briefly explain what this module adds to the workspace..."
                class="w-full bg-bg border border-border rounded-lg p-3 text-sm text-fg outline-none focus:border-primary/50 resize-none"
              ></textarea>
            </div>
          </div>
          <div
            class="modal-footer p-5 border-t border-border flex justify-end gap-3"
          >
            <button
              id="close-modal"
              class="px-5 py-2 rounded-lg text-xs font-mono font-medium text-muted border border-border hover:bg-surface transition-colors uppercase"
            >
              Cancel
            </button>
            <button
              id="save-modal"
              class="px-5 py-2 rounded-lg text-xs font-mono font-medium bg-primary text-white hover:bg-primary/90 transition-all uppercase"
            >
              Create Module
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../../scripts/auth-guard.js"></script>
    <script src="../../scripts/api.js"></script>
    <script src="../../../public/assets/js/addons.js"></script>
  </body>
</html>
