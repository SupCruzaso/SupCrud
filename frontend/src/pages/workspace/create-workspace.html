<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupCrud | Create Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#09090b", // Fondo oscuro profundo
              card: "#121214", // Color de tarjetas
              fg: "#ffffff", // Texto principal
              muted: "#a1a1aa", // Texto secundario
              border: "#27272a", // Bordes sutiles
              primary: "#3b82f6", // Azul principal
              accent: "#10b981", // Verde éxito
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

      body {
        background-color: #09090b;
        color: #ffffff;
        font-family: "Inter", sans-serif;
      }

      .fade-up {
        animation: fadeUp 0.4s ease-out forwards;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6">
    <div
      class="w-full max-w-md bg-card border border-border rounded-2xl p-8 shadow-2xl fade-up"
    >
      <div class="mb-8 text-center">
        <div
          class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 border border-primary/20 text-primary mb-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">New Workspace</h1>
        <p class="text-muted text-sm mt-2">
          Create a professional environment for your PQRS management.
        </p>
      </div>

      <form id="create-ws-form" class="space-y-6">
        <div>
          <label
            class="block text-[10px] font-mono uppercase tracking-widest text-muted mb-2"
            >Workspace Name</label
          >
          <input
            type="text"
            id="ws-name"
            required
            placeholder="e.g. Customer Success Team"
            class="w-full bg-bg border border-border rounded-lg px-4 py-3 text-sm focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all placeholder:text-muted/30"
          />
        </div>

        <p
          id="status-msg"
          class="hidden text-[10px] font-mono text-center uppercase py-2 rounded-md"
        ></p>

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/10"
        >
          <span>Create Environment</span>
        </button>
      </form>

      <div class="mt-8 text-center border-t border-border pt-6">
        <a
          href="selector.html"
          class="text-xs font-mono text-muted hover:text-fg transition-colors flex items-center justify-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3 w-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
          Back to selector
        </a>
      </div>
    </div>

    <script src="../../../public/assets/js/createWorspace.js"></script>
    <script src="../../scripts/auth-guard.js"></script>
    <script src="../../scripts/api.js"></script>
  </body>
</html>
