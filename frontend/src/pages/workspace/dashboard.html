<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Inbox — SupCrud Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Syne", "sans-serif"],
              mono: ["DM Mono", "monospace"],
            },
            colors: {
              bg: "#0c0e14",
              surface: "#13161f",
              card: "#181c28",
              border: "#242840",
              primary: "#5b6ef5",
              accent: "#38e5c4",
              warn: "#f5a623",
              info: "#64b5f6",
              fg: "#e8eaf6",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../../styles/dashboard.css" />
    <style>
      .priority-HIGH {
        color: #f87171;
      }
      .priority-MEDIUM {
        color: #f5a623;
      }
      .priority-LOW {
        color: #38e5c4;
      }
      .type-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        font-family: "DM Mono", monospace;
      }
      .type-P {
        background: rgba(91, 110, 245, 0.15);
        color: #5b6ef5;
        border: 1px solid rgba(91, 110, 245, 0.3);
      }
      .type-Q {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
        border: 1px solid rgba(248, 113, 113, 0.25);
      }
      .type-R {
        background: rgba(245, 166, 35, 0.12);
        color: #f5a623;
        border: 1px solid rgba(245, 166, 35, 0.25);
      }
      .type-S {
        background: rgba(56, 229, 196, 0.12);
        color: #38e5c4;
        border: 1px solid rgba(56, 229, 196, 0.25);
      }
      .status-OPEN {
        background: rgba(91, 110, 245, 0.12);
        color: #5b6ef5;
        border-color: rgba(91, 110, 245, 0.3);
      }
      .status-IN_PROGRESS {
        background: rgba(245, 166, 35, 0.12);
        color: #f5a623;
        border-color: rgba(245, 166, 35, 0.3);
      }
      .status-RESOLVED {
        background: rgba(56, 229, 196, 0.12);
        color: #38e5c4;
        border-color: rgba(56, 229, 196, 0.3);
      }
      .status-CLOSED {
        background: rgba(107, 114, 128, 0.12);
        color: #6b7280;
        border-color: rgba(107, 114, 128, 0.3);
      }
      .status-REOPENED {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.3);
      }
      select.field-filter {
        background: #13161f;
        border: 1px solid #242840;
        border-radius: 8px;
        padding: 0.45rem 0.75rem;
        font-size: 0.75rem;
        font-family: "DM Mono", monospace;
        color: #e8eaf6;
        outline: none;
        cursor: pointer;
      }
      select.field-filter:focus {
        border-color: rgba(91, 110, 245, 0.5);
      }
      .ticket-row:hover td {
        background: #1a1e2e;
      }

      /* Refinamiento de Inputs y Selects */
      select.field-filter,
      input.field-filter {
        background: #13161f;
        border: 1px solid #242840;
        border-radius: 10px;
        font-size: 0.75rem;
        font-family: "DM Mono", monospace;
        color: #e8eaf6;
        transition: all 0.2s ease;
      }

      input.field-filter::placeholder {
        color: #4b5563;
        font-size: 0.7rem;
        letter-spacing: 0.02em;
      }

      /* Hover y Focus */
      select.field-filter:hover,
      input.field-filter:hover {
        border-color: #3f445e;
      }

      /* Animación para el buscador */
      .group-focus-within svg {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <span class="font-display font-bold text-fg text-sm">Acme Corp</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a1 1 0 001 1h1a1 1 0 011 1v3a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 011-1h1a1 1 0 001-1V7a2 2 0 00-2-2H5z"
            />
          </svg>
          <span>Tickets</span>
        </a>
        <a href="agents.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span>Agents</span>
        </a>
        <a href="../owner/addons.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"
            />
          </svg>
          <span>Add-ons</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="login.html" class="nav-item nav-item-logout">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="mb-6 fade-up flex items-center justify-between">
        <div>
          <p
            class="text-xs text-muted uppercase tracking-[0.2em] mb-1 font-mono"
          >
            Workspace
          </p>
          <h1 class="font-display text-3xl font-bold text-fg">Ticket Inbox</h1>
        </div>
        <div class="flex items-center gap-2">
          <span id="total-label" class="text-xs font-mono text-muted"></span>
        </div>
      </div>

      <!-- Stats row -->
      <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div
          class="bg-card border border-border rounded-xl p-3 text-center stat-card"
        >
          <p class="font-display text-2xl font-bold text-fg" id="stat-all">0</p>
          <p class="text-[10px] font-mono text-muted uppercase tracking-wider">
            Total
          </p>
        </div>
        <div
          class="bg-card border border-primary/20 rounded-xl p-3 text-center stat-card"
        >
          <p
            class="font-display text-2xl font-bold text-primary"
            id="stat-open"
          >
            0
          </p>
          <p class="text-[10px] font-mono text-muted uppercase tracking-wider">
            Open
          </p>
        </div>
        <div
          class="bg-card border border-warn/20 rounded-xl p-3 text-center stat-card"
        >
          <p class="font-display text-2xl font-bold text-warn" id="stat-in">
            0
          </p>
          <p class="text-[10px] font-mono text-muted uppercase tracking-wider">
            In Progress
          </p>
        </div>
        <div
          class="bg-card border border-accent/20 rounded-xl p-3 text-center stat-card"
        >
          <p
            class="font-display text-2xl font-bold text-accent"
            id="stat-resolved"
          >
            0
          </p>
          <p class="text-[10px] font-mono text-muted uppercase tracking-wider">
            Resolved
          </p>
        </div>
        <div
          class="bg-card border border-border rounded-xl p-3 text-center stat-card"
        >
          <p
            class="font-display text-2xl font-bold text-muted"
            id="stat-closed"
          >
            0
          </p>
          <p class="text-[10px] font-mono text-muted uppercase tracking-wider">
            Closed
          </p>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex flex-col md:flex-row gap-4 mb-6 fade-up">
        <div class="relative flex-1 group">
          <div
            class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-muted group-focus-within:text-primary transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
          <input
            id="f-search"
            type="text"
            placeholder="Search tickets by ID, subject or customer..."
            class="field-filter w-full pl-10 pr-4 py-2.5 !bg-surface/50 border-border focus:border-primary/50 transition-all outline-none"
          />
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <div
            class="flex items-center gap-2 bg-surface/30 p-1 rounded-lg border border-border/50"
          >
            <select
              id="f-status"
              class="field-filter border-none bg-transparent py-1.5 text-[11px]"
            >
              <option value="">Status</option>
              <option>OPEN</option>
              <option>IN_PROGRESS</option>
              <option>RESOLVED</option>
              <option>CLOSED</option>
            </select>
            <div class="w-px h-4 bg-border"></div>
            <select
              id="f-priority"
              class="field-filter border-none bg-transparent py-1.5 text-[11px]"
            >
              <option value="">Priority</option>
              <option>HIGH</option>
              <option>MEDIUM</option>
              <option>LOW</option>
            </select>
          </div>

          <button
            id="clear-filters"
            class="p-2.5 rounded-lg text-muted border border-border hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/20 transition-all"
            title="Clear all filters"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Table -->
      <div
        class="bg-card border border-border rounded-xl overflow-hidden fade-up"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border">
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Ref
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Type
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Subject
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Status
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Priority
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Agent
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Created
                </th>
              </tr>
            </thead>
            <tbody id="ticket-tbody"></tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div
          class="px-5 py-3 border-t border-border flex items-center justify-between"
        >
          <span id="page-info" class="text-xs font-mono text-muted"></span>
          <div class="flex gap-2">
            <button
              id="prev-btn"
              class="px-3 py-1.5 rounded-lg text-xs font-mono text-muted border border-border hover:bg-surface transition-colors disabled:opacity-40"
              disabled
            >
              ← Prev
            </button>
            <button
              id="next-btn"
              class="px-3 py-1.5 rounded-lg text-xs font-mono text-muted border border-border hover:bg-surface transition-colors disabled:opacity-40"
            >
              Next →
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../../../public/assets/js/tickets.js"></script>
    <script src="../../scripts/auth-guard.js"></script>
    <script src="../../scripts/api.js"></script>
  </body>
</html>
