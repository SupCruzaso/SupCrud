<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents — SupCrud Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Syne", "sans-serif"],
              mono: ["DM Mono", "monospace"],
            },
            colors: {
              bg: "#0c0e14",
              surface: "#13161f",
              card: "#181c28",
              border: "#242840",
              primary: "#5b6ef5",
              accent: "#38e5c4",
              warn: "#f5a623",
              info: "#64b5f6",
              fg: "#e8eaf6",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../../styles/dashboard.css" />
  </head>
  <body class="min-h-screen flex">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <span class="font-display font-bold text-fg text-sm">SupCrud</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a1 1 0 001 1h1a1 1 0 011 1v3a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 011-1h1a1 1 0 001-1V7a2 2 0 00-2-2H5z"
            />
          </svg>
          <span>Tickets</span>
        </a>
        <a href="agents.html" class="nav-item active">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span>Agents</span>
        </a>
        <a href="../owner/addons.html" class="nav-item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 011-1h1a2 2 0 100-4H7a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"
            />
          </svg>
          <span>Add-ons</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="login.html" class="nav-item nav-item-logout">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="mb-8 fade-up flex items-center justify-between">
        <div>
          <p
            class="text-xs text-muted uppercase tracking-[0.2em] mb-1 font-mono"
          >
            Workspace Management
          </p>
          <h1 class="font-display text-3xl font-bold text-fg">Agents</h1>
        </div>
        <button
          id="invite-btn"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white font-mono text-xs font-medium uppercase tracking-wider hover:bg-primary/90 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          Invite Agent
        </button>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-8">
        <div
          class="stat-card bg-card border border-primary/20 rounded-xl p-4 text-center"
        >
          <p class="font-display text-2xl font-bold text-fg" id="count-total">
            --
          </p>
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-wider mt-1"
          >
            Total Agents
          </p>
        </div>
        <div
          class="stat-card bg-card border border-accent/20 rounded-xl p-4 text-center"
        >
          <p
            class="font-display text-2xl font-bold text-accent"
            id="count-active"
          >
            --
          </p>
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-wider mt-1"
          >
            Active Now
          </p>
        </div>
        <div
          class="stat-card bg-card border border-warn/20 rounded-xl p-4 text-center"
        >
          <p
            class="font-display text-2xl font-bold text-warn"
            id="count-pending"
          >
            --
          </p>
          <p
            class="text-[10px] font-mono text-muted uppercase tracking-wider mt-1"
          >
            Pending Invites
          </p>
        </div>
      </div>

      <div
        class="bg-card border border-border rounded-xl overflow-hidden fade-up"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border">
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Agent
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Role
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Status
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Open Tickets
                </th>
                <th
                  class="px-5 py-3 text-left text-[10px] font-mono text-muted uppercase tracking-widest"
                >
                  Actions
                </th>
              </tr>
            </thead>
            <tbody id="agents-tbody">
              <tr>
                <td colspan="5" class="py-20 text-center">
                  <div
                    class="inline-block animate-spin w-6 h-6 border-2 border-primary border-t-transparent rounded-full"
                  ></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="pending-section" class="mt-6 hidden">
        <h2
          class="font-display font-semibold text-fg text-sm mb-4 flex items-center gap-2"
        >
          Pending Invitations
          <span
            id="invite-badge"
            class="px-2 py-0.5 rounded-full bg-warn/10 text-warn border border-warn/25 text-[10px] font-mono"
            >0</span
          >
        </h2>
        <div id="invites-list" class="space-y-2"></div>
      </div>

      <div id="invite-modal" class="modal-overlay hidden">
        <div class="modal-box">
          <div class="modal-header">
            <h2 class="font-display font-semibold text-fg text-base">
              Invite Agent
            </h2>
            <button id="close-invite" class="text-muted hover:text-fg">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="field-group mb-4">
              <label
                class="field-label block text-[10px] uppercase font-mono text-muted mb-1"
                >Email Address</label
              >
              <input
                id="invite-email"
                type="email"
                placeholder="agent@company.com"
                class="w-full bg-bg border border-border rounded-lg p-2.5 text-sm text-fg outline-none focus:border-primary/50 transition-colors"
              />
            </div>
            <div class="field-group mb-4">
              <label
                class="field-label block text-[10px] uppercase font-mono text-muted mb-1"
                >Role</label
              >
              <select
                id="invite-role"
                class="w-full bg-bg border border-border rounded-lg p-2.5 text-sm text-fg outline-none focus:border-primary/50 transition-colors"
              >
                <option value="AGENT">Agent</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <div
              class="bg-surface border border-border rounded-lg p-3 text-[10px] font-mono text-muted italic"
            >
              * The invitation link will be sent to the email provided and will
              expire in 48 hours.
            </div>
          </div>
          <div
            class="modal-footer flex justify-end gap-3 p-4 border-t border-border"
          >
            <button
              id="cancel-invite"
              class="px-4 py-2 rounded-lg text-xs font-mono text-muted border border-border hover:bg-surface transition-colors"
            >
              Cancel
            </button>
            <button
              id="send-invite"
              class="px-4 py-2 rounded-lg text-xs font-mono bg-primary text-white hover:bg-primary/90 transition-colors"
            >
              Send Invite
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../../../public/assets/js/agents.js"></script>
    <script src="../../scripts/auth-guard.js"></script>
    <script src="../../scripts/api.js"></script>
  </body>
</html>
