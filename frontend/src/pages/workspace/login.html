<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — SupCrud Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Syne", "sans-serif"],
              mono: ["DM Mono", "monospace"],
            },
            colors: {
              bg: "#0c0e14",
              surface: "#13161f",
              card: "#181c28",
              border: "#242840",
              primary: "#5b6ef5",
              accent: "#38e5c4",
              warn: "#f5a623",
              info: "#64b5f6",
              fg: "#e8eaf6",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./../../../public/assets/css/global.css" />
    <script src="./../../../public/assets/js/auth-logic.js" defer></script>
  </head>
  <body class="min-h-screen grid-bg flex items-center justify-center px-6">
    <div class="w-full max-w-md fade-up">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary mb-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <h1 class="font-display text-2xl font-bold text-fg">SupCrud</h1>
        <p class="text-muted text-xs font-mono mt-1">Workspace Login</p>
      </div>

      <!-- Tabs -->
      <div class="flex bg-surface border border-border rounded-xl p-1 mb-6">
        <button
          id="tab-login"
          class="flex-1 py-2 rounded-lg text-xs font-mono font-medium transition-colors bg-card text-fg border border-border"
        >
          Sign In
        </button>
        <button
          id="tab-register"
          class="flex-1 py-2 rounded-lg text-xs font-mono font-medium transition-colors text-muted"
        >
          Register
        </button>
      </div>

      <!-- Sign In Form -->
      <div
        id="login-form"
        class="bg-card border border-border rounded-2xl p-6 space-y-4"
      >
        <!-- Google OAuth -->
        <button
          id="google-btn"
          class="w-full flex items-center justify-center gap-3 py-2.5 rounded-lg border border-border bg-surface hover:bg-card hover:border-muted/50 transition-colors"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span class="text-sm font-mono text-fg">Continue with Google</span>
        </button>

        <div class="divider">or</div>

        <div>
          <label
            class="block text-[10px] font-mono text-muted uppercase tracking-widest mb-1.5"
            >Email</label
          >
          <input
            id="email"
            type="email"
            placeholder="you@company.com"
            class="field-input"
          />
        </div>
        <div>
          <label
            class="block text-[10px] font-mono text-muted uppercase tracking-widest mb-1.5"
            >Password</label
          >
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="field-input pr-10"
            />
            <button
              id="toggle-pass"
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-fg"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
        </div>

        <p
          id="login-error"
          style="display: none"
          class="text-xs font-mono text-center"
        ></p>

        <button
          id="login-btn"
          class="w-full py-2.5 rounded-lg bg-primary text-white font-mono text-sm font-medium hover:bg-primary/90 transition-colors"
        >
          Sign In
        </button>
      </div>

      <!-- Register Form -->
      <div
        id="register-form"
        class="bg-card border border-border rounded-2xl p-6 space-y-4 hidden"
      >
        <button
          class="w-full flex items-center justify-center gap-3 py-2.5 rounded-lg border border-border bg-surface hover:bg-card transition-colors"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span class="text-sm font-mono text-fg">Sign up with Google</span>
        </button>
        <div class="divider">or</div>
        <div>
          <label
            class="block text-[10px] font-mono text-muted uppercase tracking-widest mb-1.5"
            >Full Name</label
          >
          <input
            id="reg-name"
            type="text"
            placeholder="Jane Doe"
            class="field-input"
          />
        </div>
        <div>
          <label
            class="block text-[10px] font-mono text-muted uppercase tracking-widest mb-1.5"
            >Email</label
          >
          <input
            id="reg-email"
            type="email"
            placeholder="you@company.com"
            class="field-input"
          />
        </div>
        <div>
          <label
            class="block text-[10px] font-mono text-muted uppercase tracking-widest mb-1.5"
            >Password</label
          >
          <input
            id="reg-pass"
            type="password"
            placeholder="Min. 8 characters"
            class="field-input"
          />
        </div>
        <button
          id="register-btn"
          class="w-full py-2.5 rounded-lg bg-primary text-white font-mono text-sm font-medium hover:bg-primary/90 transition-colors"
        >
          Create Account
        </button>
      </div>

      <p class="text-center text-xs font-mono text-muted mt-6">
        <a href="../landing/index.html" class="hover:text-fg transition-colors"
          >← Back to landing</a
        >
      </p>
    </div>
  </body>
</html>
